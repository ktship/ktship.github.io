<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunPod • Qwen vs PixelDiT 가이드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #0f172a;
            --card: #1e2937;
            --text: #e2e8f0;
            --primary: #3b82f6;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #f8fafc;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }

        h2 {
            font-size: 1.55rem;
            font-weight: 600;
            margin-top: 48px;
            margin-bottom: 18px;
            color: #f1f5f9;
            padding-bottom: 8px;
            border-bottom: 2px solid #334155;
        }

        h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-top: 32px;
            margin-bottom: 12px;
        }

        .section {
            background-color: var(--card);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 36px;
            box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.2);
        }

        pre {
            background-color: #0f172a;
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.92rem;
            line-height: 1.55;
            margin: 14px 0;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            background-color: #334155;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            color: #93c5fd;
        }

        .workflow-btn {
            display: inline-flex;
            align-items: center;
            background-color: #1e40af;
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: 600;
            margin: 12px 0;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgb(30 64 175 / 0.3);
        }

        .workflow-btn:hover {
            background-color: #1e3a8a;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(30 64 175 / 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #1e2937;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(15 23 42 / 0.1);
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            background-color: #334155;
            font-weight: 600;
            color: #e0e7ff;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }
